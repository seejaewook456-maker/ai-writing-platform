services:
  mysql:
    image: mysql:8.0
    container_name: novelnest-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - novelnest-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: seejaewook/novelnest:latest
    container_name: novelnest-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - novelnest-network

volumes:
  mysql-data:
  uploads:

networks:
  novelnest-network:
    driver: bridge