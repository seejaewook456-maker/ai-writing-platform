spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

# Nginx 리버스 프록시 뒤에서 X-Forwarded-* 헤더를 신뢰해 HTTPS/실제 host를 인식
server:
  forward-headers-strategy: framework

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  frontend:
    base-url: https://novelnestia.com
  backend:
    base-url: https://api.novelnestia.com
  cors:
    allowed-origins: https://novelnestia.com,https://www.novelnestia.com
