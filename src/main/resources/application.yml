spring:
  application:
    name: ai-writing-platform
  profiles:
    active: local

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000     # 1시간
  refresh-expiration: 604800000  # 7일

ai:
  api-key: ${AI_API_KEY}
  base-url: https://api.anthropic.com

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
